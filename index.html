<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- 強制瀏覽器不快取，確保拿到最新代碼 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <meta name="referrer" content="no-referrer">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="髒亂點巡檢">
    <meta name="theme-color" content="#020617">
    
    <link rel="manifest" id="dynamic-manifest">

    <title>115年南投縣髒亂點巡查系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

        html, body { 
            width: 100vw; height: 100dvh; 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #020617; color: #f8fafc; 
            margin: 0; padding: 0; overflow: hidden; 
            overscroll-behavior: none; 
        }

        .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-panel { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.7); }

        #splash-screen, #login-screen { transition: opacity 0.5s ease-in-out; }
        .pulse-ring { animation: pulse 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1); }
        @keyframes pulse { 0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(14, 165, 233, 0); } 100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); } }

        .leaflet-control-attribution { display: none !important; }
        .leaflet-control-zoom { border: none !important; margin-top: 250px !important; }
        .leaflet-bar a { background-color: rgba(30, 41, 59, 0.8) !important; color: #38bdf8 !important; border-color: rgba(255,255,255,0.1) !important;}

        .bottom-sheet { transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .bottom-sheet.hidden-sheet { transform: translateY(100%); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-tooltip { background: rgba(15, 23, 42, 0.85) !important; backdrop-filter: blur(4px) !important; border: 1px solid rgba(255, 255, 255, 0.15) !important; color: #f8fafc !important; border-radius: 8px !important; padding: 5px 10px !important; font-size: 12px !important; font-weight: 500 !important; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5) !important; white-space: nowrap !important; }
        
        .user-location-marker { background-color: #3b82f6; border: 2px solid white; border-radius: 50%; width: 16px; height: 16px; box-shadow: 0 0 15px rgba(59, 130, 246, 0.8); position: relative; z-index: 1000; }
        .user-pulse { position: absolute; top: -8px; left: -8px; width: 32px; height: 32px; background-color: rgba(59, 130, 246, 0.6); border-radius: 50%; animation: user-ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes user-ping { 75%, 100% { transform: scale(2); opacity: 0; } }

        .safe-top-padding { padding-top: max(1rem, env(safe-area-inset-top)); }
        
        /* Lightbox */
        #lightbox { transition: opacity 0.3s ease; }
        #lightbox-img { transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease; }

        /* Period & Category Toggle Switch */
        .period-toggle-bg { background-color: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
        .period-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .period-btn.active { background-color: #0ea5e9; color: white; font-weight: bold; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4); }
        .period-btn.inactive { color: #94a3b8; }
        
        .category-pill { transition: all 0.3s ease; }
        .category-pill.active { background-color: #0ea5e9; color: white; border-color: #38bdf8; font-weight: bold; box-shadow: 0 2px 10px rgba(14, 165, 233, 0.3); }
        .category-pill.inactive { background-color: rgba(30, 41, 59, 0.7); color: #94a3b8; border-color: #334155; }

        /* Category specific styles */
        .badge-waste { background-color: rgba(71, 85, 105, 0.3); color: #94a3b8; border: 1px solid #475569; }
        .badge-cigarette { background-color: rgba(249, 115, 22, 0.2); color: #fb923c; border: 1px solid rgba(249, 115, 22, 0.4); }
        .badge-weed { background-color: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body>

    <!-- 1. 歡迎與 KML 載入頁 -->
    <div id="splash-screen" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-slate-950">
        <div class="relative flex items-center justify-center w-32 h-32 mb-8">
            <div class="absolute inset-0 rounded-full border-2 border-sky-500 pulse-ring"></div>
            <div class="w-24 h-24 relative z-10 flex items-center justify-center bg-slate-800 rounded-full shadow-[0_0_15px_rgba(14,165,233,0.5)] border border-sky-500/50">
                <i class="ph-fill ph-map-pin-line text-5xl text-sky-400"></i>
            </div>
        </div>
        <h1 class="text-3xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-blue-500 mb-2">髒亂點巡檢</h1>
        <p class="text-slate-400 tracking-widest text-sm uppercase">115年 廢棄物/菸蒂/雜草</p>
        <p class="text-sm text-red-500 font-bold mt-2 shadow-black">v3.0 終極修復版</p>
        
        <div id="loading-status" class="mt-12 text-sky-400 text-sm animate-pulse flex items-center gap-2">
            <i class="ph ph-spinner animate-spin text-lg"></i> 載入 KML 圖資中...
        </div>
        
        <!-- 手動上傳 KML -->
        <div id="kml-upload-fallback" class="hidden mt-8 flex flex-col items-center">
            <p class="text-red-400 text-xs mb-3 font-bold bg-red-500/20 px-4 py-2 rounded-lg">無法自動讀取 KML，請手動選擇「115年南投縣髒亂點.kml」</p>
            <label class="bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white font-bold py-2 px-6 rounded-full cursor-pointer transition-colors shadow-lg flex items-center gap-2">
                <i class="ph-bold ph-upload-simple"></i> 選擇 KML 檔案
                <input type="file" accept=".kml" class="hidden" id="kml-file-input" onchange="handleManualKmlUpload(event)">
            </label>
        </div>
    </div>

    <!-- 1.5 密碼登入頁面 -->
    <div id="login-screen" class="fixed inset-0 z-[9998] hidden flex-col items-center justify-center bg-slate-950/95 backdrop-blur-xl">
        <div class="glass-panel p-8 rounded-2xl flex flex-col items-center w-10/12 max-w-sm shadow-2xl border border-sky-500/30">
            <div class="w-16 h-16 bg-sky-500/20 rounded-full flex items-center justify-center mb-4">
                <i class="ph-fill ph-lock-key text-3xl text-sky-400"></i>
            </div>
            <h2 class="text-xl font-bold text-white mb-2 tracking-widest">系統登入</h2>
            <p class="text-slate-400 text-sm mb-2">請輸入授權碼以存取巡檢資料</p>
            <p class="text-xs text-red-500 font-bold mb-6">v3.0 終極修復版</p>
            <input type="password" id="pwd-input" placeholder="請輸入密碼" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-3 text-white text-center tracking-widest focus:outline-none focus:border-sky-400 mb-2 transition-colors">
            <p id="pwd-error" class="text-red-400 text-xs mb-4 h-4 opacity-0 transition-opacity">密碼錯誤，請重新輸入</p>
            <button id="btn-login" onclick="checkPassword()" class="w-full bg-gradient-to-r from-sky-600 to-blue-600 hover:from-sky-500 hover:to-blue-500 text-white font-bold py-3 px-4 rounded-xl shadow-[0_0_15px_rgba(14,165,233,0.4)] transition-all active:scale-95 tracking-widest cursor-pointer flex justify-center items-center gap-2">
                進入系統
            </button>
        </div>
    </div>

    <!-- 圖片預覽器 (Lightbox) -->
    <div id="lightbox" class="fixed inset-0 z-[9999] bg-slate-950/95 backdrop-blur-md hidden flex-col items-center justify-center opacity-0 p-4" onclick="closeLightbox()">
        <div class="absolute top-[max(1.5rem,env(safe-area-inset-top))] right-4 z-[100] bg-slate-800/80 rounded-full w-10 h-10 flex items-center justify-center cursor-pointer hover:bg-slate-700 text-white border border-slate-600 shadow-xl" onclick="closeLightbox(); event.stopPropagation();">
            <i class="ph-bold ph-x text-xl"></i>
        </div>
        <div id="lightbox-loading" class="absolute flex flex-col items-center justify-center gap-3 text-sky-400 z-0">
            <i class="ph ph-spinner animate-spin text-5xl"></i>
            <span class="text-sm font-bold tracking-widest mt-2">載入高畫質原圖...</span>
        </div>
        <img id="lightbox-img" src="" class="max-w-full max-h-[85dvh] object-contain rounded-xl shadow-2xl relative z-10 scale-95 opacity-0 cursor-pointer" onclick="closeLightbox(); event.stopPropagation();">
    </div>

    <!-- PWA 安裝提示 -->
    <div id="pwa-prompt" class="fixed top-4 left-4 right-4 z-[9997] bg-sky-600 text-white p-4 rounded-xl shadow-2xl flex items-start gap-3 hidden transition-transform translate-y-[-150%]">
        <i class="ph-fill ph-download-simple text-2xl"></i>
        <div class="flex-1">
            <h4 class="font-bold mb-1">將系統加入主畫面</h4>
            <p class="text-sm opacity-90 leading-tight">點選下方「分享」按鈕，選擇「加入主畫面」，即可像原生 App 一樣使用！</p>
        </div>
        <button onclick="hidePwaPrompt()" class="text-white opacity-70 hover:opacity-100 cursor-pointer"><i class="ph ph-x text-lg"></i></button>
    </div>

    <!-- 2. 主畫面 (地圖容器) -->
    <div id="map" class="absolute inset-0 z-0"></div>

    <!-- 3. UI 覆蓋層 -->
    <div id="ui-layer" class="absolute inset-0 z-10 pointer-events-none">
        
        <!-- 頂部區塊 -->
        <div class="pointer-events-auto absolute top-0 left-0 w-full safe-top-padding px-4 pb-3 bg-gradient-to-b from-slate-950 via-slate-950/95 to-transparent z-[50]">
            
            <!-- 類別切換器 -->
            <div class="flex gap-2 overflow-x-auto no-scrollbar py-2 mb-1 w-full touch-pan-x" id="category-selector">
                <button class="category-pill active shrink-0 px-4 py-1.5 rounded-full text-xs border" onclick="setCategoryFilter('全部')">全部類別</button>
                <button class="category-pill inactive shrink-0 px-4 py-1.5 rounded-full text-xs border flex items-center gap-1" onclick="setCategoryFilter('一般廢棄物')"><i class="ph-fill ph-trash"></i> 廢棄物</button>
                <button class="category-pill inactive shrink-0 px-4 py-1.5 rounded-full text-xs border flex items-center gap-1" onclick="setCategoryFilter('菸蒂')"><i class="ph-fill ph-cigarette"></i> 菸蒂</button>
                <button class="category-pill inactive shrink-0 px-4 py-1.5 rounded-full text-xs border flex items-center gap-1" onclick="setCategoryFilter('雜草')"><i class="ph-fill ph-leaf"></i> 雜草</button>
            </div>

            <!-- 上下半年切換開關 (若選雜草則隱藏) -->
            <div id="period-toggle-container" class="flex justify-center mb-3 transition-opacity duration-300">
                <div class="period-toggle-bg p-1 rounded-full flex w-64 shadow-lg">
                    <button id="btn-period-h1" onclick="setPeriod('H1')" class="period-btn active flex-1 py-1.5 rounded-full text-sm flex justify-center items-center gap-1">
                        <i class="ph-fill ph-sun text-lg"></i> 上半年 (6月)
                    </button>
                    <button id="btn-period-h2" onclick="setPeriod('H2')" class="period-btn inactive flex-1 py-1.5 rounded-full text-sm flex justify-center items-center gap-1">
                        <i class="ph-fill ph-moon-stars text-lg"></i> 下半年 (11月)
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-bold flex items-center gap-2 text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-blue-400">
                    <i class="ph-fill ph-map-pin text-sky-400" id="header-icon"></i>
                    <span id="header-title">請選擇鄉鎮</span>
                </h2>
                <div class="flex gap-2">
                    <button class="glass w-10 h-10 rounded-full text-slate-300 hover:text-white flex justify-center items-center cursor-pointer" onclick="toggleView()" id="btn-toggle-view">
                        <i class="ph-fill ph-list text-xl"></i>
                    </button>
                    <button class="glass w-10 h-10 rounded-full text-slate-300 hover:text-white flex justify-center items-center cursor-pointer" onclick="if(currentBounds && map) map.fitBounds(currentBounds, { padding: [50, 50] })">
                        <i class="ph ph-corners-out text-xl"></i>
                    </button>
                </div>
            </div>

            <!-- 全局搜尋列 -->
            <div class="relative w-full mb-3">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                <input type="text" id="search-input" placeholder="搜尋建檔編號或地點名稱..." class="w-full bg-slate-800/80 border border-slate-700 rounded-full pl-10 pr-4 py-2 text-sm text-white focus:outline-none focus:border-sky-400 transition-colors" oninput="handleSearch()">
                <div id="search-results" class="absolute top-full left-0 right-0 mt-1 bg-slate-800 rounded-xl shadow-2xl z-[60] hidden max-h-48 overflow-y-auto border border-slate-700"></div>
            </div>
            
            <!-- 鄉鎮市橫向浮動按鈕 -->
            <div class="flex gap-2 overflow-x-auto no-scrollbar py-1 mb-2 w-full touch-pan-x" style="-webkit-overflow-scrolling: touch;" id="township-selector"></div>

            <!-- 戰情進度儀表板 -->
            <div class="w-full px-1">
                <div class="flex justify-between text-[11px] text-slate-400 font-bold mb-1">
                    <span id="progress-text">🏆 <span id="progress-period-label">上半年</span>達成率：0/0 點位</span>
                    <span id="progress-percent" class="text-sky-400">0%</span>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-1.5 overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-sky-400 to-blue-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- 4. 清單模式 (List View) -->
        <div id="list-view" class="pointer-events-auto absolute inset-0 z-[45] bg-slate-950 overflow-y-auto hidden pt-[280px] pb-10 px-4" style="touch-action: pan-y;">
            <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-2">
                <h3 id="list-main-title" class="text-lg font-bold text-sky-400 flex items-center gap-2">
                    <i class="ph-fill ph-list-bullets"></i> 巡檢清單
                </h3>
                <span class="text-xs bg-slate-800 text-slate-300 px-2 py-1 rounded-md" id="list-period-badge">當前: 上半年</span>
            </div>
            <div id="list-container" class="flex flex-col gap-4"></div>
        </div>

        <!-- 5. 底部資訊與多照片面板 -->
        <div id="bottom-sheet" class="pointer-events-auto absolute bottom-0 left-0 bottom-sheet hidden-sheet glass-panel w-full rounded-t-3xl p-5 pb-8 shadow-[0_-20px_50px_rgba(0,0,0,0.8)] max-h-[85vh] overflow-y-auto flex flex-col z-[60]" style="touch-action: pan-y;">
            
            <div class="flex justify-between items-center mb-4">
                <div class="w-8 h-1.5"></div>
                <div class="w-12 h-1.5 bg-slate-600 rounded-full cursor-pointer" onclick="hideBottomSheet()"></div>
                <button class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-800/80 text-slate-400 hover:text-white cursor-pointer" onclick="hideBottomSheet()">
                    <i class="ph-bold ph-x text-lg"></i>
                </button>
            </div>
            
            <div id="sheet-content" class="flex-1">
                <div class="flex justify-between items-start mb-4 border-b border-slate-700/50 pb-4">
                    <div class="pr-2">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded" id="sheet-category-badge">類別</span>
                            <span class="text-xs text-slate-400 bg-slate-800 px-2 py-0.5 rounded border border-slate-700" id="sheet-id-badge">編號</span>
                        </div>
                        <h3 class="text-lg font-bold text-white leading-tight" id="sheet-title">點位名稱</h3>
                    </div>
                    <button id="mark-btn" class="shrink-0 flex flex-col items-center justify-center gap-0.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all border cursor-pointer h-[50px] min-w-[70px]" onclick="toggleItemStatus()">
                        <span class="text-[10px] opacity-70 leading-none" id="mark-period-text">上半年</span>
                        <div class="flex items-center gap-1 mt-0.5">
                            <i class="ph-fill ph-check-circle" id="mark-icon"></i> 
                            <span id="mark-text" class="leading-none">未巡檢</span>
                        </div>
                    </button>
                </div>
                
                <div class="text-sm text-slate-300 mb-4 w-full bg-slate-900/50 p-3 rounded-xl border border-slate-700/50 flex flex-col gap-2" id="sheet-desc">
                    <!-- 詳細資訊 -->
                </div>
                
                <!-- 原地圖點位參考照片 -->
                <div class="mb-4 bg-slate-800/80 p-4 rounded-xl border border-slate-600/80 hidden" id="ref-photos-section">
                    <h4 class="text-sm font-bold text-slate-200 flex items-center gap-2 mb-3">
                        <i class="ph-fill ph-image text-emerald-400 text-lg"></i> 原地圖參考照片
                    </h4>
                    <div id="ref-photo-grid" class="flex flex-col gap-2"></div>
                </div>

                <!-- 照片上傳區 -->
                <div class="mb-5 bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                    <div class="flex justify-between items-center mb-3">
                        <h4 class="text-sm font-bold text-slate-300 flex items-center gap-2">
                            <i class="ph-fill ph-camera text-sky-400 text-lg"></i> 現場拍攝
                        </h4>
                        <label class="bg-sky-600 hover:bg-sky-500 text-white text-xs font-bold py-1.5 px-3 rounded-lg flex items-center gap-1 cursor-pointer transition-colors shadow-lg">
                            <i class="ph ph-upload-simple text-base"></i> 點擊拍攝
                            <input type="file" accept="image/*" multiple class="hidden" onchange="handlePhotoUpload(event)">
                        </label>
                    </div>
                    <div id="photo-preview-grid" class="grid grid-cols-3 gap-2 mb-3 empty:hidden"></div>
                    <button id="btn-upload-drive" onclick="uploadPhotosToDrive()" class="w-full bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white text-sm font-bold py-2.5 rounded-lg flex items-center justify-center gap-2 transition-colors mt-2 cursor-pointer shadow-lg">
                        <i class="ph-fill ph-cloud-arrow-up text-lg text-sky-400"></i> <span id="upload-btn-text">上傳照片並填寫【上半年】報表</span>
                    </button>
                </div>

                <button id="nav-btn" class="w-full bg-gradient-to-r from-sky-600 to-blue-600 hover:from-sky-500 hover:to-blue-500 text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95 cursor-pointer">
                    <i class="ph-fill ph-navigation-arrow text-xl"></i>
                    <span>開啟 Google Maps 導航</span>
                </button>
            </div>
        </div>

        <!-- 6. 實時定位按鈕 -->
        <button id="locate-btn" class="pointer-events-auto absolute bottom-8 right-4 z-[40] glass p-3 rounded-full text-sky-400 hover:text-white shadow-[0_0_15px_rgba(14,165,233,0.3)] transition-all active:scale-95 cursor-pointer" onclick="locateUser()">
            <i class="ph-fill ph-crosshair text-2xl"></i>
        </button>
    </div>

    <!-- ==========================================
         JavaScript 核心邏輯 
         ========================================== -->
    <script>
        // ------------------ PWA 及基本設定 ------------------
        const manifestData = {
            "name": "南投縣髒亂點巡查系統",
            "short_name": "髒亂點巡檢",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#020617",
            "theme_color": "#020617",
            "icons": [{
                "src": "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256'><rect width='256' height='256' fill='%23020617'/><circle cx='128' cy='128' r='96' fill='none' stroke='%2338bdf8' stroke-width='16'/><path d='M128,64 L160,160 L96,160 Z' fill='%2338bdf8'/></svg>",
                "sizes": "192x192 512x512",
                "type": "image/svg+xml"
            }]
        };
        document.getElementById('dynamic-manifest').href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifestData));

        // 移除不支援的 blob: Service Worker 註冊方式，避免產生 TypeError。
        // 若未來需要啟用 PWA 離線快取，請在同目錄下建立真實的 sw.js 檔案即可。
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => reg.update())
                .catch(err => console.log('提示: 若需完整 PWA 體驗，請於伺服器根目錄建立 sw.js 檔案。'));
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();

        // ------------------ KML 解析與資料建構 ------------------
        async function loadKMLData() {
            try {
                const response = await fetch('115年南投縣髒亂點.kml');
                if (!response.ok) throw new Error("找不到 KML 檔案");
                const kmlText = await response.text();
                parseKMLString(kmlText);
            } catch (error) {
                console.warn("自動讀取 KML 失敗，顯示手動上傳按鈕", error);
                document.getElementById('loading-status').classList.add('hidden');
                document.getElementById('kml-upload-fallback').classList.remove('hidden');
            }
        }

        function handleManualKmlUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('kml-upload-fallback').classList.add('hidden');
                document.getElementById('loading-status').classList.remove('hidden');
                document.getElementById('loading-status').innerHTML = '<i class="ph ph-spinner animate-spin text-lg"></i> KML 讀取成功，解析中...';
                
                setTimeout(() => { parseKMLString(e.target.result); }, 500);
            };
            reader.readAsText(file);
        }

        function parseKMLString(kmlString) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(kmlString, "text/xml");
            
            const folders = xmlDoc.getElementsByTagName("Folder");
            mapData = {}; 
            let globalPointIndex = 0; 

            Array.from(folders).forEach(folder => {
                const folderNameNode = folder.getElementsByTagName("name")[0];
                if (!folderNameNode) return;
                const folderName = folderNameNode.textContent;
                
                let category = "";
                if (folderName.includes("廢棄物")) category = "一般廢棄物";
                else if (folderName.includes("菸蒂")) category = "菸蒂";
                else if (folderName.includes("雜草")) category = "雜草";
                else return; 

                const placemarks = folder.getElementsByTagName("Placemark");
                Array.from(placemarks).forEach(pm => {
                    const pmNameNode = pm.getElementsByTagName("name")[0];
                    const pmName = pmNameNode ? pmNameNode.textContent.trim() : "";

                    const coordNode = pm.getElementsByTagName("coordinates")[0];
                    if (!coordNode) return;
                    const coords = coordNode.textContent.trim().split(',');
                    const lng = parseFloat(coords[0]);
                    const lat = parseFloat(coords[1]);

                    let idRaw = "", township = "", location = "", agency = "", landZoning = "", images = [];
                    let landSec = "", landNum = ""; 

                    const dataNodes = pm.getElementsByTagName("Data");
                    Array.from(dataNodes).forEach(data => {
                        const nameAttr = data.getAttribute("name");
                        if(!nameAttr) return;
                        
                        const valNode = data.getElementsByTagName("value")[0];
                        const val = valNode ? valNode.textContent.trim() : "";

                        if (nameAttr === "案件數") idRaw = val;
                        else if (nameAttr.includes("鄉鎮") || nameAttr.includes("行政區")) township = val;
                        else if (nameAttr.includes("地點")) location = val; 
                        else if (nameAttr === "地段" || nameAttr.includes("地段")) landSec = val;
                        else if (nameAttr === "地號" || nameAttr.includes("地號")) landNum = val;
                        else if (nameAttr.includes("權責")) agency = val;
                        else if (nameAttr.includes("分區")) landZoning = val;
                        else if (nameAttr === "gx_media_links") images = val ? val.split(' ').filter(u => u.trim() !== '') : [];
                    });

                    const townshipKey = township.substring(0, 3);
                    if (!townshipKey) return;
                    
                    const uniqueId = `${category}_${idRaw}_${globalPointIndex++}`;

                    let finalName = "";
                    let validPmName = (pmName && !pmName.startsWith("點") && !pmName.toLowerCase().startsWith("point") && pmName !== "未命名地點") ? pmName : "";
                    let landStr = [landSec, landNum].filter(Boolean).join(' ');

                    if (category === '雜草') {
                        finalName = landStr || location || validPmName || "未提供地段地號";
                    } else {
                        finalName = location || validPmName || landStr || "未提供地點";
                    }

                    if (!mapData[townshipKey]) mapData[townshipKey] = { name: townshipKey, points: [] };

                    mapData[townshipKey].points.push({
                        id: uniqueId,
                        rawId: idRaw, 
                        category: category,
                        name: finalName, 
                        lat: lat,
                        lng: lng,
                        agency: agency || "未提供",
                        landZoning: landZoning || "未提供",
                        images: images
                    });
                });
            });
            
            if (Object.keys(mapData).length === 0) {
                alert("⚠️ 系統未能從 KML 中解析到對應圖層資料！請確認 KML 內容。");
            }
            
            if (localStorage.getItem('nantou_messy_system_auth') === 'true') {
                performSyncAndEnter();
            } else {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.visibility = 'hidden';
                    const loginScreen = document.getElementById('login-screen');
                    loginScreen.classList.remove('hidden');
                    loginScreen.style.display = 'flex';
                }, 500);
            }
        }

        // ------------------ 地圖核心 ------------------
        let map;
        let activeLayers = [];
        let currentBounds = null;
        let userMarker = null;
        let isListView = false;

        function createCategoryIcon(category, isDone) {
            let iconClass, mainColor, glowColor, badgeClass;
            
            if (category === '一般廢棄物') {
                iconClass = 'ph-trash'; mainColor = '#94a3b8'; glowColor = 'rgba(148,163,184,0.5)';
            } else if (category === '菸蒂') {
                iconClass = 'ph-cigarette'; mainColor = '#f97316'; glowColor = 'rgba(249,115,22,0.5)';
            } else {
                iconClass = 'ph-leaf'; mainColor = '#10b981'; glowColor = 'rgba(16,185,129,0.5)';
            }

            if (isDone) { mainColor = '#475569'; glowColor = 'transparent'; }
            const opacity = isDone ? 0.75 : 1;
            
            return L.divIcon({ 
                className: 'custom-leaflet-icon', 
                html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 50" width="40" height="50" style="opacity:${opacity}; filter: drop-shadow(0px 5px 4px rgba(0,0,0,0.5)); overflow:visible;">
                        ${!isDone ? `<circle cx="20" cy="20" r="18" fill="none" stroke="${mainColor}" stroke-width="2" opacity="0">
                            <animate attributeName="r" values="18; 28" dur="1.5s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.8; 0" dur="1.5s" repeatCount="indefinite"/>
                        </circle>` : ''}
                        <path d="M20 2C10.059 2 2 10.059 2 20c0 13.5 18 28 18 28s18-14.5 18-28c0-9.941-8.059-18-18-18z" fill="rgba(15, 23, 42, 0.95)" stroke="${mainColor}" stroke-width="2.5"/>
                        <foreignObject x="8" y="8" width="24" height="24">
                            <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex; justify-content:center; align-items:center; height:100%; color:${mainColor}; font-size:16px;">
                                <i class="ph-fill ${iconClass}"></i>
                            </div>
                        </foreignObject>
                       </svg>`, 
                iconSize: [40, 50], 
                iconAnchor: [20, 50]
            });
        }

        function initMap() {
            map = L.map('map', { zoomControl: false, tap: false }).setView([23.903, 120.951], 10);
            L.control.zoom({ position: 'topright' }).addTo(map);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { 
                attribution: '&copy; OpenStreetMap', subdomains: 'abcd', maxZoom: 20 
            }).addTo(map);
            
            map.on('click', function() {
                const bs = document.getElementById('bottom-sheet');
                if(bs && !bs.classList.contains('hidden-sheet')) hideBottomSheet();
            });
        }

        function drawMapForTownship(tId) {
            const bounds = [];
            const data = mapData[tId];
            if(!data || !data.points) return bounds;

            data.points.forEach(poi => {
                if (currentCategoryFilter !== '全部' && poi.category !== currentCategoryFilter) return;

                const stateObj = inspectionState[poi.id] || { H1: false, H2: false, done: false };
                const isDone = poi.category === '雜草' ? stateObj.done : stateObj[currentPeriod];

                const marker = L.marker([poi.lat, poi.lng], { icon: createCategoryIcon(poi.category, isDone) }).addTo(map);
                
                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    map.flyTo([poi.lat, poi.lng], 16, { animate: true, duration: 1.2 });
                    showBottomSheet(poi, tId);
                });
                
                let colorClass = 'text-sky-400';
                if (isDone) colorClass = 'text-slate-400';
                else if (poi.category === '菸蒂') colorClass = 'text-orange-400';
                else if (poi.category === '雜草') colorClass = 'text-emerald-400';

                marker.bindTooltip(`<span class="${colorClass} font-bold">${poi.name}${isDone ? ' (已巡檢/結案)' : ''}</span>`, { permanent: true, direction: 'top', className: 'glass-tooltip', offset: [0, -35] });
                activeLayers.push(marker); 
                bounds.push([poi.lat, poi.lng]);
            });

            return bounds;
        }

        function loadTownship(tId, keepHighlight = false) {
            currentTownshipId = tId;
            const data = mapData[tId];
            if (!data) return;

            document.getElementById('header-title').innerText = `${data.name} 查報視角`;

            document.querySelectorAll('.township-pill').forEach(btn => {
                if(btn.dataset.id === tId) btn.className = 'township-pill shrink-0 whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow-lg bg-sky-600/90 border border-sky-400 text-white cursor-pointer';
                else btn.className = 'township-pill shrink-0 whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow border bg-slate-800/60 border-slate-700 text-slate-400 cursor-pointer hover:bg-slate-700';
            });

            activeLayers.forEach(layer => map.removeLayer(layer)); activeLayers = [];
            if (!keepHighlight) hideBottomSheet(); 

            const bounds = drawMapForTownship(tId);
            updateProgressBar();

            if (!keepHighlight && bounds.length > 0) {
                currentBounds = L.latLngBounds(bounds);
                map.fitBounds(currentBounds, { padding: [50, 50], animate: true, duration: 1.5 });
            }
        }

        function updateProgressBar() {
            if (!currentTownshipId) return;
            const data = mapData[currentTownshipId];
            if(!data || !data.points) return;
            
            let total = 0;
            let comp = 0;
            
            data.points.forEach(poi => { 
                if (currentCategoryFilter !== '全部' && poi.category !== currentCategoryFilter) return;
                total++;
                const stateObj = inspectionState[poi.id] || {};
                const isDone = poi.category === '雜草' ? stateObj.done : stateObj[currentPeriod];
                if(isDone) comp++; 
            });
            
            const pct = total === 0 ? 0 : Math.round((comp / total) * 100);
            
            let periodText = currentCategoryFilter === '雜草' ? '總體' : (currentPeriod === 'H1' ? '上半年' : '下半年');
            if (currentCategoryFilter === '全部') periodText = '當前';

            document.getElementById('progress-text').innerHTML = `🏆 <span id="progress-period-label">${periodText}</span>達成率：${comp}/${total} 點位`;
            document.getElementById('progress-percent').innerText = `${pct}%`;
            document.getElementById('progress-bar').style.width = `${pct}%`;
        }

        // ------------------ 底部面板與打卡邏輯 ------------------
        
        function updateBottomSheetStatus() {
            if(!currentItemId || !currentTownshipId) return;
            
            const poiData = mapData[currentTownshipId].points.find(p => p.id === currentItemId);
            if(!poiData) return;

            const stateObj = inspectionState[currentItemId] || {};
            let isDone = false;
            
            const btn = document.getElementById('mark-btn');
            const markText = document.getElementById('mark-text');
            const markIcon = document.getElementById('mark-icon');
            const periodText = document.getElementById('mark-period-text');
            
            if (poiData.category === '雜草') {
                isDone = stateObj.done;
                periodText.style.display = 'none'; 
                document.getElementById('upload-btn-text').innerText = `上傳照片並填寫【雜草】進度`;
                
                if (isDone) {
                    btn.className = "shrink-0 flex flex-col items-center justify-center gap-0.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all bg-slate-800/80 border-slate-600 text-slate-400 cursor-pointer h-[50px] min-w-[80px]";
                    markIcon.className = "ph-fill ph-check-circle text-lg";
                    markText.innerText = "已結案";
                } else {
                    btn.className = "shrink-0 flex flex-col items-center justify-center gap-0.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all bg-slate-800 border-slate-600 text-slate-300 cursor-pointer h-[50px] min-w-[80px]";
                    markIcon.className = "ph-fill ph-warning-circle text-lg";
                    markText.innerText = "未處理";
                }
            } else {
                isDone = stateObj[currentPeriod];
                periodText.style.display = 'block'; 
                periodText.innerText = currentPeriod === 'H1' ? '上半年狀態' : '下半年狀態';
                document.getElementById('upload-btn-text').innerText = `上傳照片並填寫【${currentPeriod === 'H1' ? '上半年' : '下半年'}】報表`;
                
                if (isDone) {
                    btn.className = "shrink-0 flex flex-col items-center justify-center gap-0.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all bg-slate-800/80 border-slate-600 text-slate-400 cursor-pointer h-[50px] min-w-[80px]";
                    markIcon.className = "ph-fill ph-check-circle text-lg";
                    markText.innerText = "已巡檢";
                } else {
                    btn.className = "shrink-0 flex flex-col items-center justify-center gap-0.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all bg-slate-800 border-slate-600 text-slate-300 cursor-pointer h-[50px] min-w-[80px]";
                    markIcon.className = "ph-fill ph-warning-circle text-lg";
                    markText.innerText = "未巡檢";
                }
            }
        }

        // ==========================================
        // 🚨 終極除錯優化 1：強制捕捉狀態按鈕錯誤並彈窗
        // ==========================================
        async function toggleItemStatus() {
            if(!currentItemId || !currentTownshipId) return;
            const poiData = mapData[currentTownshipId].points.find(p => p.id === currentItemId);
            
            if (!inspectionState[currentItemId]) {
                inspectionState[currentItemId] = { H1: false, H2: false, done: false };
            }
            
            let newState;
            if (poiData.category === '雜草') {
                newState = !inspectionState[currentItemId].done;
            } else {
                newState = !inspectionState[currentItemId][currentPeriod];
            }

            const btn = document.getElementById('mark-btn');
            const markText = document.getElementById('mark-text');
            const markIcon = document.getElementById('mark-icon');

            const originalClassName = btn.className;
            const originalIconClass = markIcon.className;
            const originalText = markText.innerText;

            btn.className = "shrink-0 flex flex-col items-center justify-center gap-0.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all bg-slate-800 border-slate-700 text-sky-400 cursor-wait h-[50px] min-w-[80px]";
            markIcon.className = "ph ph-spinner animate-spin text-lg";
            markText.innerText = '同步中...';

            const apiPeriod = poiData.category === '雜草' ? 'None' : currentPeriod;
            const apiStatus = poiData.category === '雜草' ? (newState ? '已結案' : '未處理') : (newState ? '已巡檢' : '未巡檢');

            try {
                const response = await fetch(GOOGLE_APP_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'update_status',
                        category: poiData.category,
                        period: apiPeriod,
                        itemId: poiData.rawId,
                        status: apiStatus,
                        township: mapData[currentTownshipId].name,
                        pointName: poiData.name
                    })
                });

                if (!response.ok) throw new Error(`HTTP 錯誤狀態碼: ${response.status}`);
                
                const result = await response.json();
                
                if (result.status === "success" || result.status === "warning") {
                    if (poiData.category === '雜草') {
                        inspectionState[currentItemId].done = newState;
                    } else {
                        inspectionState[currentItemId][currentPeriod] = newState;
                    }
                    
                    saveState(); 
                    updateBottomSheetStatus();
                    
                    if (result.status === "warning") {
                        alert(`⚠️ 試算表警報：\n${result.message}`);
                    }
                } else {
                    alert(`⚠️ 後端拒絕更新：\n${result.message}\n(請確認後端代碼是否已更新支援 update_status 動作)`);
                    btn.className = originalClassName; markIcon.className = originalIconClass; markText.innerText = originalText;
                }
            } catch(e) { 
                // ⚠️ 若卡住，這裡一定會跳出錯誤！
                alert(`連線失敗！\n1. 您的後端 URL 是否正確？\n2. GAS 部署權限是否為「所有人」？\n3. 系統錯誤訊息：${e.message}`); 
                btn.className = originalClassName; markIcon.className = originalIconClass; markText.innerText = originalText;
            }
        }

        function showBottomSheet(poi, tId) {
            currentItemId = poi.id;
            
            document.getElementById('sheet-title').innerText = poi.name; 
            document.getElementById('sheet-id-badge').innerText = `案件數: ${poi.rawId}`;
            
            const catBadge = document.getElementById('sheet-category-badge');
            catBadge.innerText = poi.category;
            
            let badgeClass = 'badge-waste';
            if (poi.category === '菸蒂') badgeClass = 'badge-cigarette';
            else if (poi.category === '雜草') badgeClass = 'badge-weed';
            catBadge.className = `text-[10px] font-bold px-2 py-0.5 rounded ${badgeClass}`;
            
            const descHTML = `
                <div class="flex items-center justify-between border-b border-slate-700/50 pb-2">
                    <span class="text-slate-400 text-xs font-bold">主管機關</span>
                    <span class="text-white text-sm">${poi.agency}</span>
                </div>
                <div class="flex items-center justify-between pt-1">
                    <span class="text-slate-400 text-xs font-bold">使用分區</span>
                    <span class="text-slate-200 text-sm">${poi.landZoning}</span>
                </div>
            `;
            document.getElementById('sheet-desc').innerHTML = descHTML;
            
            updateBottomSheetStatus();
            renderPhotos();
            
            const refSection = document.getElementById('ref-photos-section');
            const refGrid = document.getElementById('ref-photo-grid');
            
            if (poi.images && poi.images.length > 0) {
                refSection.classList.remove('hidden');
                refGrid.innerHTML = poi.images.map((url, idx) => `
                    <div onclick="openLightbox('${url}')" class="w-full bg-slate-900 border border-slate-700 hover:border-sky-500 rounded-xl p-3 flex items-center justify-between cursor-pointer transition-all active:scale-95 group shadow-lg">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="w-12 h-12 rounded-lg bg-slate-800 flex items-center justify-center group-hover:bg-sky-500/20 transition-colors shrink-0">
                                <i class="ph-fill ph-image text-2xl text-slate-400 group-hover:text-sky-400 transition-colors"></i>
                            </div>
                            <div class="flex flex-col overflow-hidden">
                                <span class="text-white font-bold text-sm truncate">原地圖參考照片 ${idx + 1}</span>
                                <span class="text-xs text-slate-500 mt-0.5 truncate">點擊開啟高畫質預覽</span>
                            </div>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-slate-400 group-hover:text-sky-400 group-hover:bg-sky-500/20 transition-colors shrink-0">
                            <i class="ph-bold ph-corners-out text-lg"></i>
                        </div>
                    </div>
                `).join('');
            } else {
                refSection.classList.add('hidden');
                refGrid.innerHTML = '';
            }
            
            const navBtn = document.getElementById('nav-btn');
            if (navBtn) {
                const destinationQuery = encodeURIComponent(`${poi.lat},${poi.lng}`); 
                navBtn.onclick = () => { window.open(`https://www.google.com/maps/dir/?api=1&destination=${destinationQuery}`, '_blank'); }; 
            }
            
            const bs = document.getElementById('bottom-sheet');
            if (bs) bs.classList.remove('hidden-sheet');
        }

        function hideBottomSheet() { 
            const bs = document.getElementById('bottom-sheet');
            if(!bs || bs.classList.contains('hidden-sheet')) return;
            bs.classList.add('hidden-sheet'); currentItemId = null;
        }

        function handlePhotoUpload(event) {
            const files = event.target.files;
            if(!files.length || !currentItemId || !currentTownshipId) return;

            const poiData = mapData[currentTownshipId].points.find(p => p.id === currentItemId);
            const storageKey = getStorageKey(currentItemId, poiData.category);

            if (!inspectionPhotos[storageKey]) inspectionPhotos[storageKey] = [];
            
            const grid = document.getElementById('photo-preview-grid');
            if(grid) grid.innerHTML += `<div class="col-span-3 text-center text-sky-400 text-sm py-2 font-bold animate-pulse" id="loading-txt"><i class="ph ph-spinner animate-spin"></i> 照片準備中...</div>`;

            let processed = 0;
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > 800) { h *= 800 / w; w = 800; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        inspectionPhotos[storageKey].push({ id: Date.now() + Math.random(), data: canvas.toDataURL('image/jpeg', 0.6), uploaded: false });
                        processed++;
                        if(processed === files.length) { saveState(); renderPhotos(); }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
            event.target.value = '';
        }

        function renderPhotos() {
            if (!currentItemId || !currentTownshipId) return;
            const grid = document.getElementById('photo-preview-grid');
            if(!grid) return;
            
            const poiData = mapData[currentTownshipId].points.find(p => p.id === currentItemId);
            const storageKey = getStorageKey(currentItemId, poiData.category);

            if (inspectionPhotos[storageKey]) {
                inspectionPhotos[storageKey] = inspectionPhotos[storageKey].filter(p => !p.uploaded);
                if (inspectionPhotos[storageKey].length === 0) delete inspectionPhotos[storageKey];
            }

            const photos = inspectionPhotos[storageKey] || [];
            grid.innerHTML = ''; let hasPending = false;

            photos.forEach((photo) => {
                hasPending = true;
                const imgContent = `<img src="${photo.data}" class="w-full h-full object-cover">`;
                grid.innerHTML += `
                    <div class="relative w-full aspect-square rounded-lg border border-slate-600 overflow-hidden group bg-slate-800 flex items-center justify-center">
                        ${imgContent}
                        <button onclick="deletePhoto('${photo.id}')" class="absolute top-1 right-1 bg-red-500/80 text-white w-6 h-6 rounded-full flex items-center justify-center backdrop-blur cursor-pointer"><i class="ph-bold ph-x text-xs"></i></button>
                    </div>
                `;
            });
            if(hasPending) grid.innerHTML += `<div class="col-span-3 text-center text-sky-400 text-sm py-1 mt-1 font-bold animate-pulse"><i class="ph-fill ph-check-circle"></i> 照片已暫存，請點擊下方按鈕同步並填表</div>`;
        }

        function deletePhoto(photoId) {
            if(!confirm("確定要刪除這張尚未上傳的照片嗎？")) return;
            const poiData = mapData[currentTownshipId].points.find(p => p.id === currentItemId);
            const storageKey = getStorageKey(currentItemId, poiData.category);
            
            inspectionPhotos[storageKey] = inspectionPhotos[storageKey].filter(p => p.id !== photoId);
            saveState(); renderPhotos();
        }

        // ==========================================
        // 🚨 終極除錯優化 2：修正邏輯錯誤，並捕捉照片上傳的阻擋
        // ==========================================
        async function uploadPhotosToDrive() {
            if (!currentItemId || !currentTownshipId) return;
            const poiData = mapData[currentTownshipId].points.find(p => p.id === currentItemId);
            const storageKey = getStorageKey(currentItemId, poiData.category);

            const photos = inspectionPhotos[storageKey] || [];
            const pendingPhotos = photos.filter(p => !p.uploaded);
            
            if (pendingPhotos.length === 0) return alert("目前沒有需要上傳的新照片！");
            
            const btn = document.getElementById('btn-upload-drive');
            const originalBtnHTML = btn.innerHTML;
            
            if (btn) { btn.innerHTML = '<i class="ph ph-spinner animate-spin text-lg"></i> 上傳並填寫報表中...'; btn.disabled = true; btn.classList.add('opacity-50'); }

            let successCount = 0;
            let hasError = false;

            for (let i = 0; i < photos.length; i++) {
                if (photos[i].uploaded) continue;
                const base64Data = photos[i].data.split(',')[1];
                
                const apiPeriod = poiData.category === '雜草' ? 'None' : currentPeriod;
                const apiStatus = poiData.category === '雜草' ? '已結案' : '已巡檢';
                const fileName = `${poiData.rawId}_${apiPeriod}_${Date.now()}.jpg`;

                try {
                    const response = await fetch(GOOGLE_APP_SCRIPT_URL, {
                        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ 
                            action: 'upload_photo', 
                            category: poiData.category,    
                            period: apiPeriod,         
                            itemId: poiData.rawId,         
                            status: apiStatus,              
                            filename: fileName, 
                            mimeType: "image/jpeg", 
                            base64: base64Data,
                            township: mapData[currentTownshipId].name,
                            pointName: poiData.name, 
                            agency: poiData.agency     
                        })
                    });
                    
                    if (!response.ok) throw new Error(`HTTP 錯誤狀態碼: ${response.status}`);
                    
                    const result = await response.json();
                    
                    // 修正您原始代碼中的邏輯錯誤 (原本寫死了 || true)
                    if (result.status === "success" || result.status === "warning") { 
                        photos[i].uploaded = true; 
                        successCount++; 
                        if (result.status === "warning") {
                            console.warn("後端警告：", result.message);
                        }
                    } else {
                        throw new Error(result.message);
                    }
                } catch (err) { 
                    hasError = true;
                    // ⚠️ 如果網路被擋住，這裡會強制彈窗並且中斷迴圈，按鈕會復原！
                    alert(`上傳失敗！\n1. 請確認 GAS 部署權限是否為「所有人」。\n2. 錯誤訊息：${err.message}`);
                    break; // 停止上傳剩餘照片
                } 
            }

            if (successCount > 0) {
                inspectionPhotos[storageKey] = photos.filter(p => !p.uploaded);
                if (inspectionPhotos[storageKey].length === 0) delete inspectionPhotos[storageKey];

                if (!inspectionState[currentItemId]) inspectionState[currentItemId] = { H1: false, H2: false, done: false };
                if (poiData.category === '雜草') inspectionState[currentItemId].done = true;
                else inspectionState[currentItemId][currentPeriod] = true;

                saveState(); renderPhotos(); updateBottomSheetStatus();
                alert(`✅ 成功上傳 ${successCount} 張照片！`);
            }

            // 復原按鈕狀態
            if (btn) { 
                btn.disabled = false; btn.classList.remove('opacity-50'); 
                const btnLabel = poiData.category === '雜草' ? '雜草' : (currentPeriod === 'H1' ? '上半年' : '下半年');
                btn.innerHTML = `<i class="ph-fill ph-cloud-arrow-up text-lg text-sky-400"></i> 上傳照片並填寫【${btnLabel}】報表`; 
            }
        }

        function openLightbox(url) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            const loading = document.getElementById('lightbox-loading');

            lb.classList.remove('hidden'); void lb.offsetWidth; 
            lb.classList.remove('opacity-0'); img.style.opacity = '0';
            img.classList.remove('scale-100'); img.classList.add('scale-95');
            
            loading.style.display = 'flex';
            loading.innerHTML = '<i class="ph ph-spinner animate-spin text-5xl"></i><span class="text-sm font-bold tracking-widest mt-2">載入高畫質原圖...</span>';

            const cleanUrl = url.replace('authuser=0&', '');
            const proxyUrl = `https://images.weserv.nl/?url=${encodeURIComponent(cleanUrl)}&default=${encodeURIComponent(cleanUrl)}`;

            img.onload = () => { loading.style.display = 'none'; img.style.opacity = '1'; img.classList.remove('scale-95'); img.classList.add('scale-100'); };
            img.onerror = () => {
                if (img.src === proxyUrl) img.src = cleanUrl;
                else loading.innerHTML = '<i class="ph-fill ph-warning-circle text-5xl text-red-500"></i><span class="text-sm font-bold text-red-400 mt-2 text-center leading-relaxed">圖片載入失敗<br>遭到瀏覽器安全性阻擋</span>';
            };
            img.src = proxyUrl;
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.classList.add('opacity-0');
            setTimeout(() => { lb.classList.add('hidden'); document.getElementById('lightbox-img').src = ''; }, 300);
        }

        function toggleView() {
            isListView = !isListView;
            const listEl = document.getElementById('list-view');
            const btnIcon = document.querySelector('#btn-toggle-view i');
            hideBottomSheet();

            if (listEl && btnIcon) {
                if (isListView) {
                    listEl.classList.remove('hidden'); btnIcon.className = "ph-fill ph-map-trifold text-xl text-sky-400"; renderListView();
                } else {
                    listEl.classList.add('hidden'); btnIcon.className = "ph-fill ph-list text-xl"; if (map) map.invalidateSize(); 
                }
            }
        }

        function renderListView(filterText = "") {
            const container = document.getElementById('list-container');
            if(!container) return;
            container.innerHTML = '';
            
            let targetTownships = filterText ? Object.keys(mapData) : [currentTownshipId];
            if (targetTownships.length === 0) return;
            let hasAnyResult = false;

            targetTownships.forEach(tId => {
                const d = mapData[tId];
                if (!d || !d.points) return;

                let itemsHTML = ''; 
                let tComp = 0; let tTotal = 0;
                
                d.points.forEach(poi => {
                    if (currentCategoryFilter !== '全部' && poi.category !== currentCategoryFilter) return;
                    tTotal++;

                    const stateObj = inspectionState[poi.id] || {};
                    const isDone = poi.category === '雜草' ? stateObj.done : stateObj[currentPeriod];
                    if(isDone) tComp++; 

                    if (filterText && !poi.name.includes(filterText) && !poi.rawId.includes(filterText) && !d.name.includes(filterText)) return;
                    hasAnyResult = true;
                    
                    let badgeClass = 'badge-waste';
                    if (poi.category === '菸蒂') badgeClass = 'badge-cigarette';
                    else if (poi.category === '雜草') badgeClass = 'badge-weed';
                    
                    itemsHTML += `
                        <div class="bg-slate-900 border ${isDone ? 'border-slate-700/50' : 'border-slate-700'} p-4 rounded-xl shadow-lg flex items-center justify-between cursor-pointer active:scale-95 transition-transform" onclick="jumpToMap('${tId}', '${poi.id}', ${poi.lat}, ${poi.lng})">
                            <div class="pr-2">
                                <div class="text-xs text-slate-400 mb-1 flex flex-wrap gap-2 items-center">
                                    <span class="${badgeClass} px-2 py-0.5 rounded text-[10px] font-bold">${poi.category}</span>
                                    <span class="bg-slate-800 px-2 py-0.5 rounded border border-slate-700 text-slate-300">#${poi.rawId}</span>
                                    ${isDone ? '<span class="text-slate-400"><i class="ph-fill ph-check-circle"></i> 已巡檢/結案</span>' : ''}
                                </div>
                                <h4 class="text-white font-bold text-base line-clamp-1">${poi.name}</h4>
                                <div class="text-[11px] text-slate-500 mt-1">${poi.agency}</div>
                            </div>
                            <div class="w-10 h-10 shrink-0 rounded-full bg-slate-800 flex items-center justify-center text-sky-400"><i class="ph-fill ph-navigation-arrow text-lg"></i></div>
                        </div>`;
                });

                if (itemsHTML !== '') {
                    container.innerHTML += `
                        <div class="mt-4 mb-2">
                            <h4 class="text-white font-bold text-base flex items-center gap-2 bg-slate-800/80 px-3 py-2 rounded-lg border border-slate-700">
                                <i class="ph-fill ph-map-pin text-sky-400"></i> ${d.name} 
                                <span class="text-xs text-slate-400 font-normal ml-auto">進度 ${tComp}/${tTotal}</span>
                            </h4>
                        </div>
                        <div class="flex flex-col gap-3 pl-2 border-l-2 border-slate-800 ml-3">${itemsHTML}</div>
                    `;
                }
            });
            if(!hasAnyResult) container.innerHTML = '<p class="text-slate-500 text-center py-10">找不到符合的案件或地段地號</p>';
        }

        function jumpToMap(tId, itemId, lat, lng) {
            if (isListView) toggleView();
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('search-input').value = '';

            if (currentTownshipId !== tId) loadTownship(tId, true);
            
            const poi = mapData[tId].points.find(p => p.id === itemId);
            if(!poi) return;

            map.flyTo([lat, lng], 16, { animate: true, duration: 1.2 });
            setTimeout(() => { showBottomSheet(poi, tId); }, 1000);
        }

        function handleSearch() {
            const input = document.getElementById('search-input').value.trim();
            const resultBox = document.getElementById('search-results');
            if(!resultBox) return;

            if (input.length === 0) {
                resultBox.classList.add('hidden');
                if (isListView) renderListView(); return;
            }

            if (isListView) { renderListView(input); } 
            else {
                resultBox.innerHTML = '';
                let count = 0;
                Object.keys(mapData).forEach(tId => {
                    const d = mapData[tId];
                    if (!d || !d.points) return;
                    d.points.forEach(poi => {
                        if (currentCategoryFilter !== '全部' && poi.category !== currentCategoryFilter) return;

                        if (poi.name.includes(input) || poi.rawId.includes(input) || d.name.includes(input)) {
                            count++;
                            resultBox.innerHTML += `<div class="px-4 py-3 hover:bg-slate-700 cursor-pointer border-b border-slate-700 last:border-0 flex flex-col gap-1" onclick="jumpToMap('${tId}', '${poi.id}', ${poi.lat}, ${poi.lng})"><div class="flex items-center gap-2"><span class="text-[10px] bg-slate-800 px-1.5 rounded text-sky-400">${d.name}</span><span class="text-xs text-slate-400">案件數: ${poi.rawId}</span></div><div class="text-white font-medium text-sm line-clamp-1">${poi.name}</div></div>`;
                        }
                    });
                });
                if (count > 0) resultBox.classList.remove('hidden'); else { resultBox.innerHTML = '<div class="px-4 py-3 text-slate-500 text-sm">無符合結果</div>'; resultBox.classList.remove('hidden'); }
            }
        }

        async function performSyncAndEnter() {
            await fetchSyncState();
            
            const loginScreen = document.getElementById('login-screen');
            if (loginScreen) loginScreen.style.display = 'none';
            
            const splash = document.getElementById('splash-screen');
            if (splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.visibility = 'hidden', 500);
            }
            
            if(map) map.invalidateSize(); 
            
            const townshipSelector = document.getElementById('township-selector');
            townshipSelector.innerHTML = '';
            Object.keys(mapData).forEach((id) => {
                const btn = document.createElement('div');
                btn.dataset.id = id;
                btn.className = `township-pill shrink-0 whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-all shadow border bg-slate-800/60 border-slate-700 text-slate-400 cursor-pointer hover:bg-slate-700`;
                btn.innerText = mapData[id].name;
                btn.onclick = () => loadTownship(id);
                townshipSelector.appendChild(btn);
            });

            if (Object.keys(mapData).length > 0) {
                loadTownship(Object.keys(mapData)[0]); 
            } else {
                alert("KML 內未發現任何點位資料！");
            }
        }

        async function checkPassword() {
            const pwdInput = document.getElementById('pwd-input').value;
            if (pwdInput === SYSTEM_PASSWORD) {
                document.getElementById('pwd-error').style.opacity = '0';
                document.getElementById('btn-login').innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> 載入系統中...';
                localStorage.setItem('nantou_messy_system_auth', 'true');
                await performSyncAndEnter();
            } else {
                document.getElementById('pwd-error').style.opacity = '1'; document.getElementById('pwd-input').value = '';
            }
        }

        window.onload = () => {
            initMap();
            loadKMLData();
        };
        
        function locateUser() {
            const btnIcon = document.querySelector('#locate-btn i');
            if(btnIcon) btnIcon.className = "ph ph-spinner animate-spin text-2xl text-sky-400"; 
            if (!navigator.geolocation) return alert("瀏覽器不支援定位功能！");
            
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude, lng = pos.coords.longitude;
                    if (userMarker && map) map.removeLayer(userMarker);
                    if (map) {
                        userMarker = L.marker([lat, lng], { icon: L.divIcon({ className: 'custom-user-icon', html: `<div class="relative"><div class="user-pulse"></div><div class="user-location-marker"></div></div>`, iconSize: [16, 16], iconAnchor: [8, 8] }), zIndexOffset: 1000 }).addTo(map);
                        map.flyTo([lat, lng], 16, { animate: true, duration: 1.5 });
                    }
                    if(btnIcon) btnIcon.className = "ph-fill ph-crosshair text-2xl text-sky-400"; 
                },
                () => { alert("無法獲取您的位置！請確認已開啟 GPS 與權限。"); if(btnIcon) btnIcon.className = "ph-fill ph-crosshair text-2xl text-sky-400"; },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }
    </script>
